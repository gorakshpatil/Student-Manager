<table class="table table-bordered table-hover">

    <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Course Code</th>
            <th>Course Name</th>
            <th>Duration</th>
            <th>Fees</th>
            <th>Description</th>
            <th>Actions</th>
        </tr>
    </thead>

    <tbody>
    <div class="d-flex justify-content-between mb-3">

    <h2>Course List</h2>

    <a th:href="@{/courses/add}" class="btn btn-primary">
        Add Course
    </a>

</div>

        <tr th:each="course : ${courses}">

            <td th:text="${course.id}"></td>
            <td th:text="${course.courseCode}"></td>
            <td th:text="${course.courseName}"></td>
            <td th:text="${course.duration}"></td>
            <td th:text="${course.fees}"></td>
            <td th:text="${course.description}"></td>

            <td>

                <a th:href="@{/courses/view/{id}(id=${course.id})}"
                   class="btn btn-info btn-sm">
                    View
                </a>

                <a th:href="@{/courses/edit/{id}(id=${course.id})}"
                   class="btn btn-warning btn-sm">
                    Edit
                </a>

                <a th:href="@{/courses/delete/{id}(id=${course.id})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Are you sure you want to delete this course?');">
                    Delete
                </a>

            </td>

        </tr>

    </tbody>

</table>
