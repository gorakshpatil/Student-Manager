<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head}"></head>

<body>

<div id="wrapper">

    <div th:replace="~{fragments/layout :: sidebar}"></div>

    <div id="page-content-wrapper">

        <nav th:replace="~{fragments/layout :: navbar}"></nav>

        <div class="content">

            <h2>Edit Course</h2>

            <form th:action="@{/courses/update}"
                  th:object="${course}"
                  method="post">

                <input type="hidden" th:field="*{id}">

                <div class="mb-3">
                    <label>Course Code</label>
                    <input type="text"
                           th:field="*{courseCode}"
                           class="form-control">
                </div>

                <div class="mb-3">
                    <label>Course Name</label>
                    <input type="text"
                           th:field="*{courseName}"
                           class="form-control">
                </div>

                <div class="mb-3">
                    <label>Duration</label>
                    <input type="text"
                           th:field="*{duration}"
                           class="form-control">
                </div>

                <div class="mb-3">
                    <label>Fees</label>
                    <input type="number"
                           th:field="*{fees}"
                           class="form-control">
                </div>

                <div class="mb-3">
                    <label>Description</label>
                    <textarea th:field="*{description}"
                              class="form-control"
                              rows="4"></textarea>
                </div>

                <button type="submit" class="btn btn-success">
                    Update Course
                </button>

                <a th:href="@{/courses}"
                   class="btn btn-secondary">
                    Cancel
                </a>

            </form>

        </div>

    </div>

</div>

<div th:replace="~{fragments/layout :: scripts}"></div>

</body>
</html>
