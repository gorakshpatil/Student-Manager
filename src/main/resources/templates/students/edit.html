<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head}"></head>

<body>

<div id="wrapper">

    <div th:replace="~{fragments/layout :: sidebar}"></div>

    <div id="page-content-wrapper">

        <nav th:replace="~{fragments/layout :: navbar}"></nav>

        <div class="content">

            <h2>Edit Student</h2>

            <form th:action="@{/students/update}"
                  th:object="${student}"
                  method="post">

                <div class="mb-3">
                    <label>Name</label>
                    <input type="text"
                           th:field="*{name}"
                           class="form-control">
                </div>

                <div class="mb-3">
                    <label>Email</label>
                    <input type="email"
                           th:field="*{email}"
                           class="form-control">
                </div>

                <div class="mb-3">
                    <label>Phone</label>
                    <input type="text"
                           th:field="*{phone}"
                           class="form-control">
                </div>

                <div class="mb-3">
                    <label>Address</label>
                    <textarea
                        th:field="*{address}"
                        class="form-control"></textarea>
                </div>

                <div class="mb-3">
                    <label>Gender</label>

                    <select th:field="*{gender}"
                            class="form-select">

                        <option value="">Select Gender</option>

                        <option value="Male">Male</option>

                        <option value="Female">Female</option>

                    </select>

                </div>

                <button class="btn btn-success">
                    Save Student
                </button>

                <a th:href="@{/students}"
                   class="btn btn-secondary">
                    Cancel
                </a>

            </form>

        </div>

    </div>

</div>

<div th:replace="~{fragments/layout :: scripts}"></div>

</body>
</html>
